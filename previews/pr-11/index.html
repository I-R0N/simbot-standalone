<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A small life</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:#0f1115; color:#e7e9ee; padding:20px 16px 40px; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:21px; margin:0 0 4px; }
  .sub { color:#8b93a7; font-size:13px; margin-bottom:18px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
           font-weight:600; margin-left:6px; vertical-align:middle; }
  .live { background:#10331f; color:#46d17f; }
  .paused { background:#3a2a10; color:#e0a83a; }
  .stale { background:#3a1a1a; color:#e06a6a; }
  .card { background:#171a21; border:1px solid #232733; border-radius:14px;
          padding:16px 18px; margin-bottom:14px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em;
             color:#8b93a7; margin:0 0 12px; }
  .row { display:flex; align-items:center; gap:12px; margin:8px 0; }
  .lbl { width:80px; font-size:13px; color:#c4cad8; }
  .track { flex:1; height:12px; background:#0f1218; border-radius:999px; overflow:hidden; }
  .fill { display:block; height:100%; border-radius:999px; transition:width .4s ease; }
  .val { width:32px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px; }
  .mood { font-size:15px; line-height:1.5; }
  .mood b { color:#fff; }
  .ev { background:#0f1218; border-left:3px solid #3a4660; border-radius:8px;
        padding:9px 12px; margin:9px 0; font-size:14px; line-height:1.45; }
  .ev .meta { color:#8b93a7; font-size:12px; margin-bottom:3px; }
  .ev .act { color:#9fb4ff; font-weight:600; }
  .ev .wh { color:#d8b06a; font-style:italic; }
  .ev .snap { color:#5b6478; font-size:11px; margin-top:5px;
              font-variant-numeric:tabular-nums; letter-spacing:.02em; }
  .empty { color:#8b93a7; font-style:italic; }
  .ident { font-size:15px; line-height:1.55; color:#e7e9ee; font-style:italic; }
  .mem { background:#0f1218; border-left:3px solid #3a4660; border-radius:8px;
         padding:9px 12px; margin:9px 0; font-size:14px; line-height:1.45; }
  .mem.reflection { border-left-color:#7a6cff; }
  .mem.review { border-left-color:#e0a83a; }
  .mem.review .kind { color:#e6c07a; }
  .mem .meta { color:#8b93a7; font-size:12px; margin-bottom:3px;
               display:flex; gap:8px; align-items:center; }
  .mem .kind { color:#b9a6ff; font-weight:600; text-transform:uppercase;
               letter-spacing:.05em; font-size:10px; }
  .mem.observation .kind { color:#9fb4ff; }
  .mem .imp { color:#d8b06a; letter-spacing:1px; font-size:11px; }
  .wstat { font-size:14px; line-height:1.5; color:#c4cad8; margin:12px 0 8px; }
  .wstat b { color:#fff; }
  /* Stage 4: the world is drawn on a canvas (tiles + sprite + path). It sizes
     to the card width and stays square; rendering/animation is all in JS. */
  #worldCanvas { display:block; width:100%; height:auto; aspect-ratio:1/1;
                 border-radius:10px; background:#0f1218; }
  /* Stage 4: stat trends — inline-SVG sparklines, one small-multiple per stat. */
  .trends { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 12px; }
  .trend { background:#0f1218; border-radius:10px; padding:8px 10px; }
  .trend .thead { display:flex; justify-content:space-between; align-items:baseline;
                  margin-bottom:4px; }
  .trend .tlbl { font-size:12px; color:#c4cad8; }
  .trend .tval { font-variant-numeric:tabular-nums; font-weight:600; font-size:13px; }
  .trend svg { display:block; width:100%; height:30px; overflow:visible; }
  .tnote { color:#5b6478; font-size:11px; margin-top:10px; }
  /* Stage 5: "Today's plan" — a compact vertical timeline of time-blocked
     goals; the block whose hour has arrived is highlighted. Hidden when absent. */
  .phead { color:#5b6478; font-size:12px; margin-bottom:8px; }
  .pblock { display:flex; gap:12px; align-items:flex-start; padding:8px 11px; margin:7px 0;
            background:#0f1218; border-left:3px solid #3a4660; border-radius:8px; }
  .pblock.active { border-left-color:#46d17f; background:#10241a; }
  .pblock .ptime { width:58px; flex:none; color:#8b93a7; font-size:12px;
                   font-variant-numeric:tabular-nums; padding-top:1px; }
  .pblock .pbody { flex:1; font-size:14px; line-height:1.4; }
  .pblock .ppart { color:#c4cad8; font-size:11px; text-transform:uppercase;
                   letter-spacing:.05em; margin-right:6px; }
  .pblock .pact { color:#9fb4ff; font-weight:600; }
  .pblock.active .pact { color:#7ee0a6; }
  .pblock .pwhere { color:#c4cad8; }
  .pblock .pnote { color:#8b93a7; font-size:12px; margin-top:3px; }
  /* Stage 6: a ✓/↯ verdict on each PAST block — did the day follow the plan? */
  .pblock .pglyph { font-weight:700; margin-right:5px; font-variant-emoji:text; }
  .pblock .pglyph.ok { color:#46d17f; }
  .pblock .pglyph.off { color:#e0a83a; }
  .pblock.deviated { border-left-color:#e0a83a; }
  .prev { color:#e0a83a; }
  /* Stage 7: Livelihood — wallet, job, skill, and the looming rent. */
  .work-top { display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .money { font-size:26px; font-weight:700; color:#7ee0a6; font-variant-numeric:tabular-nums; }
  .money.broke { color:#e06a6a; }
  .job { font-size:13px; color:#c4cad8; text-align:right; }
  .job b { color:#fff; }
  .skillrow { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .skillrow .lbl { width:64px; font-size:13px; color:#c4cad8; }
  .skilltrack { flex:1; height:8px; background:#0f1218; border-radius:999px; overflow:hidden; }
  .skillfill { display:block; height:100%; background:#6f9bff; border-radius:999px; transition:width .4s ease; }
  .skillrow .val { width:56px; text-align:right; font-size:12px; color:#8b93a7;
                   font-variant-numeric:tabular-nums; }
  .rentrow { margin-top:12px; font-size:13px; color:#8b93a7; display:flex;
             justify-content:space-between; gap:10px; }
  .overdue { color:#e06a6a; font-weight:600; }
  .legend { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px 14px;
            font-size:12px; color:#8b93a7; }
  .legend span b { color:#c4cad8; font-weight:600; }
  .legend .aff { color:#5b6478; }
  .foot { color:#5b6478; font-size:12px; text-align:center; margin-top:14px; }
  .foot button { background:#1c2230; color:#c4cad8; border:1px solid #2b3242;
                 border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h1>A small life <span id="badge" class="badge live">…</span></h1>
  <div class="sub" id="sub">loading…</div>

  <div class="card" id="worldCard" style="display:none">
    <h2>World</h2>
    <canvas id="worldCanvas" width="320" height="320"></canvas>
    <div class="wstat" id="wstat"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="card" id="planCard" style="display:none">
    <h2>Today's plan</h2>
    <div class="phead" id="planHead"></div>
    <div id="planBlocks"></div>
  </div>

  <div class="card" id="workCard" style="display:none">
    <h2>Livelihood</h2>
    <div class="work-top">
      <div class="money" id="money"></div>
      <div class="job" id="job"></div>
    </div>
    <div class="skillrow">
      <span class="lbl">skill</span>
      <span class="skilltrack"><span class="skillfill" id="skillfill"></span></span>
      <span class="val" id="skillval"></span>
    </div>
    <div class="rentrow" id="rentrow"></div>
  </div>

  <div class="card">
    <h2>Body</h2>
    <div id="bars"></div>
  </div>

  <div class="card" id="trendCard" style="display:none">
    <h2>Trends <span class="tlbl" id="trendspan" style="text-transform:none;letter-spacing:0"></span></h2>
    <div class="trends" id="trends"></div>
    <div class="tnote" id="tnote"></div>
  </div>

  <div class="card">
    <h2>Mind</h2>
    <div class="mood" id="mind">…</div>
  </div>

  <div class="card" id="selfCard" style="display:none">
    <h2>Who they are</h2>
    <div class="ident" id="identity"></div>
  </div>

  <div class="card" id="memCard" style="display:none">
    <h2>Memories</h2>
    <div id="memories"></div>
  </div>

  <div class="card">
    <h2>Recent activity</h2>
    <div id="activity"><div class="empty">loading…</div></div>
  </div>

  <div class="foot">
    <span id="updated"></span> · <button onclick="load()">Refresh now</button>
    <div id="build"></div>
  </div>
</div>

<script>
"use strict";
// state.json lives right next to this file in the public "view" repo, so we
// just fetch it relatively. The ?t= cache-buster + githack's development URL
// (short cache) keep it reasonably fresh.
const STATE_URL = "./state.json";

async function fetchState() {
  const r = await fetch(STATE_URL + "?t=" + Date.now(), { cache: "no-store" });
  if (!r.ok) throw new Error("no state");
  return await r.json();
}

// --- Rendering --------------------------------------------------------------
const STATS = [
  ["energy", "energy", false], ["full", "fullness", false],
  ["social", "social", false], ["fun", "fun", false],
  ["health", "health", false], ["stress", "stress", true],
];
function bar(label, val, badHigh) {
  const pct = Math.max(0, Math.min(100, val|0));
  const goodness = badHigh ? (100 - pct) : pct;
  const hue = Math.round(goodness * 1.2); // 0 red .. 120 green
  return `<div class="row"><span class="lbl">${label}</span>`
       + `<span class="track"><span class="fill" style="width:${pct}%;background:hsl(${hue},70%,45%)"></span></span>`
       + `<span class="val">${val|0}</span></div>`;
}
function ago(ts) {
  if (!ts) return "";
  const m = Math.max(0, Math.round((Date.now()/1000 - ts) / 60));
  if (m < 1) return "just now";
  if (m < 60) return m + " min ago";
  const hrs = Math.round(m/60);
  return hrs + (hrs === 1 ? " hour ago" : " hours ago");
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

// World (Stage 4): the embodied grid, rendered on a <canvas> — location tiles
// with their icons, the planned route as a dotted trail, and the entity sprite,
// which slides smoothly to its new cell when a fetch moves it. Vanilla canvas,
// no assets (emoji glyphs via fillText). Degrades to a hidden card when null,
// exactly like the Stage 3 placeholder it replaces.
const WORLD = { data: null, phase: "day", cur: null, from: null, to: null,
                t0: 0, dur: 700, raf: 0 };

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function easeOut(p) { return 1 - Math.pow(1 - p, 3); }

function drawWorld() {
  const cv = document.getElementById("worldCanvas");
  const w = WORLD.data;
  if (!cv || !w || !w.grid || !WORLD.cur) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = cv.clientWidth || 320;
  const S = Math.max(1, Math.round(cssW * dpr));
  if (cv.width !== S) { cv.width = S; cv.height = S; }   // keep the backing store square + crisp
  const ctx = cv.getContext("2d");
  const GW = w.grid.w, GH = w.grid.h, n = Math.max(GW, GH);
  const cell = S / n;
  const cx = c => (c + 0.5) * cell, cy = c => (c + 0.5) * cell;
  const night = WORLD.phase === "night";

  ctx.clearRect(0, 0, S, S);
  ctx.fillStyle = night ? "#0c1018" : "#12161f";
  ctx.fillRect(0, 0, S, S);

  // faint grid lines
  ctx.strokeStyle = night ? "#161d2b" : "#1b2330";
  ctx.lineWidth = Math.max(1, dpr);
  for (let i = 0; i <= n; i++) {
    const p = Math.round(i * cell) + 0.5;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, GH * cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(GW * cell, p); ctx.stroke();
  }

  const locs = Array.isArray(w.locations) ? w.locations : [];
  const it = w.intent;
  const goalName = it && it.goal && !it.arrived ? it.goal : null;

  // location tiles + icons
  const pad = cell * 0.12, rad = cell * 0.22;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  locs.forEach(l => {
    const isGoal = l.name === goalName;
    ctx.fillStyle = isGoal ? "#243456" : "#1a2030";
    roundRect(ctx, l.x * cell + pad, l.y * cell + pad, cell - 2 * pad, cell - 2 * pad, rad);
    ctx.fill();
    if (isGoal) {                                    // ring the destination
      ctx.strokeStyle = "#6f9bff"; ctx.lineWidth = Math.max(1.5, dpr * 1.2); ctx.stroke();
    }
    ctx.font = `${Math.round(cell * 0.56)}px -apple-system,Segoe UI Emoji,Noto Color Emoji,sans-serif`;
    ctx.fillText(l.icon || "", cx(l.x), cy(l.y));
  });

  // planned route: a dotted trail of dots from here toward the goal
  const path = Array.isArray(w.path) ? w.path : [];
  ctx.fillStyle = night ? "#3a4f7a" : "#41598a";
  path.forEach(p => {
    ctx.beginPath(); ctx.arc(cx(p.x), cy(p.y), Math.max(1.5, cell * 0.09), 0, 2 * Math.PI); ctx.fill();
  });

  // the entity sprite at its (possibly animating) position
  const ex = WORLD.cur.x, ey = WORLD.cur.y;
  const px = cx(ex), py = cy(ey), r = cell * 0.34;
  ctx.beginPath(); ctx.arc(px, py, r, 0, 2 * Math.PI);
  ctx.fillStyle = "#2b6cff"; ctx.fill();
  ctx.strokeStyle = "#9bbcff"; ctx.lineWidth = Math.max(1, dpr); ctx.stroke();
  ctx.font = `${Math.round(cell * 0.46)}px -apple-system,Segoe UI Emoji,Noto Color Emoji,sans-serif`;
  ctx.fillStyle = "#fff";
  ctx.fillText("🙂", px, py + cell * 0.02);
}

function animateWorld() {
  const p = easeOut(Math.min(1, (performance.now() - WORLD.t0) / WORLD.dur));
  WORLD.cur = {
    x: WORLD.from.x + (WORLD.to.x - WORLD.from.x) * p,
    y: WORLD.from.y + (WORLD.to.y - WORLD.from.y) * p,
  };
  drawWorld();
  if (p < 1) { WORLD.raf = requestAnimationFrame(animateWorld); }
  else { WORLD.cur = WORLD.to; WORLD.raf = 0; drawWorld(); }
}

function renderWorld(w, clock) {
  const card = document.getElementById("worldCard");
  if (!w || !w.grid) {
    if (WORLD.raf) { cancelAnimationFrame(WORLD.raf); WORLD.raf = 0; }
    WORLD.data = null; card.style.display = "none"; return;
  }
  card.style.display = "";
  WORLD.data = w;
  WORLD.phase = (clock && clock.phase) || "day";

  const target = w.pos ? { x: w.pos.x | 0, y: w.pos.y | 0 } : { x: 0, y: 0 };
  if (WORLD.raf) { cancelAnimationFrame(WORLD.raf); WORLD.raf = 0; }
  if (!WORLD.cur) {                          // first paint — drop the sprite in place
    WORLD.cur = { x: target.x, y: target.y };
    WORLD.to = target;
    drawWorld();
  } else if (WORLD.cur.x !== target.x || WORLD.cur.y !== target.y) {
    WORLD.from = { x: WORLD.cur.x, y: WORLD.cur.y };   // slide to the new cell
    WORLD.to = target; WORLD.t0 = performance.now();
    WORLD.raf = requestAnimationFrame(animateWorld);
  } else {
    WORLD.to = target;                       // unchanged position — redraw (path/phase may differ)
    drawWorld();
  }

  const locs = Array.isArray(w.locations) ? w.locations : [];
  const labelOf = n => { const l = locs.find(x => x.name === n); return l ? l.label : n; };
  const it = w.intent;
  let status;
  if (it && it.goal && !it.arrived) {
    status = `🚶 On the way to <b>${esc(labelOf(it.goal))}</b> to <b>${esc(it.action)}</b>.`;
  } else if (w.at) {
    status = `📍 At <b>${esc(labelOf(w.at))}</b>`
           + (it && it.action ? `, having just <b>${esc(it.action)}</b>.` : ".");
  } else {
    status = "Out, somewhere between places.";
  }
  document.getElementById("wstat").innerHTML = status;

  document.getElementById("legend").innerHTML = locs.map(l =>
    `<span>${l.icon} <b>${esc(l.label)}</b>`
    + (l.affords && l.affords.length ? ` <span class="aff">${esc(l.affords.join(", "))}</span>` : "")
    + `</span>`).join("");
}
window.addEventListener("resize", drawWorld);

// Trends (Stage 4): small-multiple sparklines — one per stat, over the recent
// per-tick history shipped in state.json. Inline SVG (no CDN): the payload is
// tiny and a handful of polylines render crisply on a phone. Each line is tinted
// by the stat's latest goodness (green good, red bad) to echo the body bars;
// stress is inverted (high = bad) just like its bar. Hidden if no history.
function trendHue(key, val, badHigh) {
  const goodness = badHigh ? (100 - val) : val;
  return Math.round(Math.max(0, Math.min(100, goodness)) * 1.2);   // 0 red .. 120 green
}
function sparkline(vals, hue) {
  const W = 100, H = 30, n = vals.length;
  if (n === 1) vals = [vals[0], vals[0]];          // a single point -> a flat line
  const m = vals.length;
  const x = i => (m === 1 ? 0 : (i / (m - 1)) * W);
  const y = v => H - (Math.max(0, Math.min(100, v)) / 100) * H;
  const pts = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const area = `0,${H} ${pts} ${W},${H}`;
  const col = `hsl(${hue},70%,55%)`;
  const last = vals[vals.length - 1];
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">`
       + `<polygon points="${area}" fill="hsl(${hue},70%,45%)" opacity="0.14"></polygon>`
       + `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6"`
       + ` stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></polyline>`
       + `<circle cx="${x(m - 1).toFixed(1)}" cy="${y(last).toFixed(1)}" r="2" fill="${col}"`
       + ` vector-effect="non-scaling-stroke"></circle></svg>`;
}
function renderTrends(tr) {
  const card = document.getElementById("trendCard");
  const points = tr && Array.isArray(tr.points) ? tr.points : [];
  if (points.length < 2) { card.style.display = "none"; return; }
  card.style.display = "";
  document.getElementById("trends").innerHTML = STATS.map(([k, lbl, bad]) => {
    const vals = points.map(p => p[k] == null ? 0 : (p[k] | 0));
    const cur = vals[vals.length - 1];
    const hue = trendHue(k, cur, bad);
    return `<div class="trend"><div class="thead">`
         + `<span class="tlbl">${lbl}</span>`
         + `<span class="tval" style="color:hsl(${hue},70%,60%)">${cur}</span></div>`
         + sparkline(vals, hue) + `</div>`;
  }).join("");
  const span = points.length, first = points[0].sim, last = points[span - 1].sim;
  document.getElementById("trendspan").textContent = `· last ${span} ticks`;
  document.getElementById("tnote").textContent =
    first && last ? `${first} → ${last}` : "";
}

// Today's plan (Stage 5): the entity's once-a-day, time-blocked intentions, as a
// vertical timeline. The active block (the latest whose hour has arrived) is
// highlighted, so you can see where the plan says it "should" be right now.
// Degrades to a hidden card when there's no plan, like the other Stage 4+ cards.
function renderPlan(plan) {
  const card = document.getElementById("planCard");
  const blocks = plan && Array.isArray(plan.blocks) ? plan.blocks : [];
  if (!blocks.length) { card.style.display = "none"; return; }
  card.style.display = "";
  const ai = plan.active_index;
  // Head: which day, when it was set, and — if it reacted mid-day (Stage 6) —
  // when it was last revised and how many revisions deep it is.
  let head = (plan.day != null ? "Day " + plan.day : "")
           + (plan.created ? " · set " + plan.created : "");
  if (plan.revision) {
    head += ` · <span class="prev">↯ revised`
          + (plan.revised ? " at " + esc(plan.revised) : "")
          + (plan.revision > 1 ? " ×" + plan.revision : "") + `</span>`;
  }
  document.getElementById("planHead").innerHTML = head;
  document.getElementById("planBlocks").innerHTML = blocks.map((b, i) => {
    const time = b.from_hour != null
      ? String(b.from_hour).padStart(2, "0") + ":00" : "";
    const part = b.label ? `<span class="ppart">${esc(b.label)}</span>` : "";
    const where = b.loc_label
      ? ` <span class="pwhere">${b.icon ? esc(b.icon) + " " : ""}${esc(b.loc_label)}</span>`
      : "";
    const note = b.note ? `<div class="pnote">${esc(b.note)}</div>` : "";
    // Past blocks carry a followed/deviated verdict; ✓ stayed on plan, ↯ drifted.
    const glyph = b.followed === true ? `<span class="pglyph ok" title="followed the plan">✓</span>`
                : b.followed === false ? `<span class="pglyph off" title="deviated from the plan">↯</span>`
                : "";
    const cls = "pblock" + (i === ai ? " active" : "")
              + (b.followed === false ? " deviated" : "");
    return `<div class="${cls}">`
         + `<div class="ptime">${esc(time)}</div>`
         + `<div class="pbody">${part}${glyph}<span class="pact">${esc(b.action || "")}</span>`
         + `${where}${note}</div></div>`;
  }).join("");
}

// Livelihood (Stage 7): the wallet, job title + level, skill progress, and the
// looming rent — the first "ratchet" that gives work a point. Overdue rent shows
// red. Degrades to a hidden card when there's no work block (older state.json).
function renderWork(work) {
  const card = document.getElementById("workCard");
  if (!work || work.money == null) { card.style.display = "none"; return; }
  card.style.display = "";
  const cur = work.currency || "";
  const moneyEl = document.getElementById("money");
  moneyEl.textContent = cur + (work.money | 0);
  moneyEl.className = "money" + (work.overdue ? " broke" : "");
  const job = work.job || {};
  document.getElementById("job").innerHTML =
    `<b>${esc(job.title || "—")}</b>` + (job.level ? ` · lvl ${job.level | 0}` : "");
  const smax = work.skill_max || 10;
  const pct = Math.max(0, Math.min(100, (work.skill / smax) * 100));
  document.getElementById("skillfill").style.width = pct + "%";
  document.getElementById("skillval").textContent = `${(work.skill ?? 0)}/${smax | 0}`;
  const hrs = Array.isArray(work.work_hours) ? work.work_hours : null;
  const openTxt = hrs
    ? `office ${String(hrs[0]).padStart(2, "0")}:00–${String(hrs[1]).padStart(2, "0")}:00` : "";
  let rent;
  if (work.overdue) {
    rent = `<span class="overdue">rent ${cur}${work.rent | 0} overdue ×${work.overdue | 0}</span>`;
  } else {
    const d = work.days_to_bill;
    const due = d === 0 ? "due today" : d === 1 ? "due tomorrow" : `due in ${d} days`;
    rent = `rent ${cur}${work.rent | 0}/day · ${due}`;
  }
  document.getElementById("rentrow").innerHTML = `<span>${rent}</span><span>${openTxt}</span>`;
}

function render(s) {
  const stats = s.stats || {};
  const meta = s.meta || {};
  const mind = s.mind || {};

  // badge: paused / stale / living
  const badge = document.getElementById("badge");
  const fresh = meta.generated_at && (Date.now()/1000 - meta.generated_at) < 3600;
  if (meta.paused) { badge.className = "badge paused"; badge.textContent = "paused"; }
  else if (!fresh) { badge.className = "badge stale"; badge.textContent = "quiet"; }
  else { badge.className = "badge live"; badge.textContent = "living"; }

  const bits = [];
  if (s.clock && s.clock.label) {
    const glyph = s.clock.phase === "night" ? "🌙" : "☀️";
    bits.push(glyph + " " + esc(s.clock.label));
  }
  if (meta.tick != null) bits.push("tick #" + meta.tick);
  if (meta.model) bits.push("model " + esc(meta.model));
  document.getElementById("sub").textContent = bits.join(" · ");

  document.getElementById("bars").innerHTML =
    STATS.map(([k, lbl, bad]) => bar(lbl, stats[k] ?? 0, bad)).join("");

  document.getElementById("mind").innerHTML =
    `Feeling <b>${esc(mind.mood || "—")}</b>, thinking <b>${esc(mind.clarity || "—")}</b>`
    + (mind.temp != null ? ` (temperature ${mind.temp}).` : ".");

  renderWorld(s.world, s.clock);   // Stage 4 — embodied grid on canvas, day/night tint
  renderPlan(s.plan);              // Stage 5 — today's day-plan + active block
  renderWork(s.work);              // Stage 7 — wallet, job, skill, rent
  renderTrends(s.trends);          // Stage 4 — per-stat sparklines over recent history

  // Self-identity (Stage 2): a rolling first-person sense of self from reflection.
  const selfCard = document.getElementById("selfCard");
  if (s.identity) {
    document.getElementById("identity").textContent = s.identity;
    selfCard.style.display = "";
  } else { selfCard.style.display = "none"; }

  // Memories (Stage 2): reflections + salient observations, each with importance.
  const memCard = document.getElementById("memCard");
  const mems = Array.isArray(s.memories) ? s.memories : [];
  if (mems.length) {
    document.getElementById("memories").innerHTML = mems.map(m => {
      const kind = m.kind === "reflection" ? "reflection"
                 : m.kind === "review" ? "review" : "observation";
      const meta = [`<span class="kind">${kind}</span>`];
      if (m.sim) meta.push(esc(m.sim));
      else if (m.t) meta.push(ago(m.t));
      if (m.importance != null) {
        const n = Math.max(1, Math.min(10, m.importance|0));
        meta.push(`<span class="imp" title="importance ${n}/10">${"●".repeat(Math.max(1, Math.round(n/2)))}</span>`);
      }
      return `<div class="mem ${kind}"><div class="meta">${meta.join(" · ")}</div>${esc(m.text)}</div>`;
    }).join("");
    memCard.style.display = "";
  } else { memCard.style.display = "none"; }

  // Activity: prefer structured activity[], fall back to plain thoughts[].
  const act = document.getElementById("activity");
  const events = Array.isArray(s.activity) && s.activity.length ? s.activity
               : (Array.isArray(s.thoughts) ? s.thoughts.map(t => ({ thought: t })) : []);
  if (events.length) {
    act.innerHTML = events.slice().reverse().map(e => {
      const meta = [];
      if (e.sim) meta.push(esc(e.sim));
      else if (e.t) meta.push(ago(e.t));
      if (e.loc) meta.push("📍 " + esc(e.loc));
      if (e.action) meta.push(`<span class="act">${esc(e.action)}</span>`);
      const wh = e.whisper ? `<div class="wh">“${esc(e.whisper)}”</div>` : "";
      const head = meta.length ? `<div class="meta">${meta.join(" · ")}</div>` : "";
      const st = e.stats ? `<div class="snap">`
        + `e ${e.stats.energy} · f ${e.stats.full} · so ${e.stats.social} · `
        + `fu ${e.stats.fun} · h ${e.stats.health} · st ${e.stats.stress}</div>` : "";
      return `<div class="ev">${head}${wh}${esc(e.thought)}${st}</div>`;
    }).join("");
  } else {
    act.innerHTML = `<div class="empty">No activity recorded yet.</div>`;
  }

  document.getElementById("updated").textContent =
    meta.generated_at ? ("updated " + ago(meta.generated_at)) : "";

  // Build stamp: which commit this page was published from (set by the preview
  // workflow for PRs, by the VM publisher on main). Cuts through githack caching.
  const b = s.build || {};
  const parts = [];
  if (b.sha) parts.push("build " + esc(b.sha));
  if (b.ref) parts.push(esc(b.ref));
  if (b.committed) parts.push(esc(b.committed));
  document.getElementById("build").textContent = parts.join(" · ");
}

async function load() {
  try { render(await fetchState()); }
  catch (e) {
    document.getElementById("sub").textContent = "couldn't load state.json yet";
    document.getElementById("badge").className = "badge stale";
    document.getElementById("badge").textContent = "offline";
  }
}
load();
setInterval(load, 30000); // refresh every 30s
</script>
</body>
</html>
