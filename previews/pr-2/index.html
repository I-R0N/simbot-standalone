<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A small life</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:#0f1115; color:#e7e9ee; padding:20px 16px 40px; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:21px; margin:0 0 4px; }
  .sub { color:#8b93a7; font-size:13px; margin-bottom:18px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
           font-weight:600; margin-left:6px; vertical-align:middle; }
  .live { background:#10331f; color:#46d17f; }
  .paused { background:#3a2a10; color:#e0a83a; }
  .stale { background:#3a1a1a; color:#e06a6a; }
  .card { background:#171a21; border:1px solid #232733; border-radius:14px;
          padding:16px 18px; margin-bottom:14px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em;
             color:#8b93a7; margin:0 0 12px; }
  .row { display:flex; align-items:center; gap:12px; margin:8px 0; }
  .lbl { width:80px; font-size:13px; color:#c4cad8; }
  .track { flex:1; height:12px; background:#0f1218; border-radius:999px; overflow:hidden; }
  .fill { display:block; height:100%; border-radius:999px; transition:width .4s ease; }
  .val { width:32px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px; }
  .mood { font-size:15px; line-height:1.5; }
  .mood b { color:#fff; }
  .ev { background:#0f1218; border-left:3px solid #3a4660; border-radius:8px;
        padding:9px 12px; margin:9px 0; font-size:14px; line-height:1.45; }
  .ev .meta { color:#8b93a7; font-size:12px; margin-bottom:3px; }
  .ev .act { color:#9fb4ff; font-weight:600; }
  .ev .wh { color:#d8b06a; font-style:italic; }
  .ev .snap { color:#5b6478; font-size:11px; margin-top:5px;
              font-variant-numeric:tabular-nums; letter-spacing:.02em; }
  .empty { color:#8b93a7; font-style:italic; }
  .ident { font-size:15px; line-height:1.55; color:#e7e9ee; font-style:italic; }
  .mem { background:#0f1218; border-left:3px solid #3a4660; border-radius:8px;
         padding:9px 12px; margin:9px 0; font-size:14px; line-height:1.45; }
  .mem.reflection { border-left-color:#7a6cff; }
  .mem .meta { color:#8b93a7; font-size:12px; margin-bottom:3px;
               display:flex; gap:8px; align-items:center; }
  .mem .kind { color:#b9a6ff; font-weight:600; text-transform:uppercase;
               letter-spacing:.05em; font-size:10px; }
  .mem.observation .kind { color:#9fb4ff; }
  .mem .imp { color:#d8b06a; letter-spacing:1px; font-size:11px; }
  .foot { color:#5b6478; font-size:12px; text-align:center; margin-top:14px; }
  .foot button { background:#1c2230; color:#c4cad8; border:1px solid #2b3242;
                 border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h1>A small life <span id="badge" class="badge live">…</span></h1>
  <div class="sub" id="sub">loading…</div>

  <div class="card">
    <h2>Body</h2>
    <div id="bars"></div>
  </div>

  <div class="card">
    <h2>Mind</h2>
    <div class="mood" id="mind">…</div>
  </div>

  <div class="card" id="selfCard" style="display:none">
    <h2>Who they are</h2>
    <div class="ident" id="identity"></div>
  </div>

  <div class="card" id="memCard" style="display:none">
    <h2>Memories</h2>
    <div id="memories"></div>
  </div>

  <div class="card">
    <h2>Recent activity</h2>
    <div id="activity"><div class="empty">loading…</div></div>
  </div>

  <div class="foot">
    <span id="updated"></span> · <button onclick="load()">Refresh now</button>
    <div id="build"></div>
  </div>
</div>

<script>
"use strict";
// state.json lives right next to this file in the public "view" repo, so we
// just fetch it relatively. The ?t= cache-buster + githack's development URL
// (short cache) keep it reasonably fresh.
const STATE_URL = "./state.json";

async function fetchState() {
  const r = await fetch(STATE_URL + "?t=" + Date.now(), { cache: "no-store" });
  if (!r.ok) throw new Error("no state");
  return await r.json();
}

// --- Rendering --------------------------------------------------------------
const STATS = [
  ["energy", "energy", false], ["full", "fullness", false],
  ["social", "social", false], ["fun", "fun", false],
  ["health", "health", false], ["stress", "stress", true],
];
function bar(label, val, badHigh) {
  const pct = Math.max(0, Math.min(100, val|0));
  const goodness = badHigh ? (100 - pct) : pct;
  const hue = Math.round(goodness * 1.2); // 0 red .. 120 green
  return `<div class="row"><span class="lbl">${label}</span>`
       + `<span class="track"><span class="fill" style="width:${pct}%;background:hsl(${hue},70%,45%)"></span></span>`
       + `<span class="val">${val|0}</span></div>`;
}
function ago(ts) {
  if (!ts) return "";
  const m = Math.max(0, Math.round((Date.now()/1000 - ts) / 60));
  if (m < 1) return "just now";
  if (m < 60) return m + " min ago";
  const hrs = Math.round(m/60);
  return hrs + (hrs === 1 ? " hour ago" : " hours ago");
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

function render(s) {
  const stats = s.stats || {};
  const meta = s.meta || {};
  const mind = s.mind || {};

  // badge: paused / stale / living
  const badge = document.getElementById("badge");
  const fresh = meta.generated_at && (Date.now()/1000 - meta.generated_at) < 3600;
  if (meta.paused) { badge.className = "badge paused"; badge.textContent = "paused"; }
  else if (!fresh) { badge.className = "badge stale"; badge.textContent = "quiet"; }
  else { badge.className = "badge live"; badge.textContent = "living"; }

  const bits = [];
  if (s.clock && s.clock.label) {
    const glyph = s.clock.phase === "night" ? "🌙" : "☀️";
    bits.push(glyph + " " + esc(s.clock.label));
  }
  if (meta.tick != null) bits.push("tick #" + meta.tick);
  if (meta.model) bits.push("model " + esc(meta.model));
  document.getElementById("sub").textContent = bits.join(" · ");

  document.getElementById("bars").innerHTML =
    STATS.map(([k, lbl, bad]) => bar(lbl, stats[k] ?? 0, bad)).join("");

  document.getElementById("mind").innerHTML =
    `Feeling <b>${esc(mind.mood || "—")}</b>, thinking <b>${esc(mind.clarity || "—")}</b>`
    + (mind.temp != null ? ` (temperature ${mind.temp}).` : ".");

  // Self-identity (Stage 2): a rolling first-person sense of self from reflection.
  const selfCard = document.getElementById("selfCard");
  if (s.identity) {
    document.getElementById("identity").textContent = s.identity;
    selfCard.style.display = "";
  } else { selfCard.style.display = "none"; }

  // Memories (Stage 2): reflections + salient observations, each with importance.
  const memCard = document.getElementById("memCard");
  const mems = Array.isArray(s.memories) ? s.memories : [];
  if (mems.length) {
    document.getElementById("memories").innerHTML = mems.map(m => {
      const kind = m.kind === "reflection" ? "reflection" : "observation";
      const meta = [`<span class="kind">${kind}</span>`];
      if (m.sim) meta.push(esc(m.sim));
      else if (m.t) meta.push(ago(m.t));
      if (m.importance != null) {
        const n = Math.max(1, Math.min(10, m.importance|0));
        meta.push(`<span class="imp" title="importance ${n}/10">${"●".repeat(Math.max(1, Math.round(n/2)))}</span>`);
      }
      return `<div class="mem ${kind}"><div class="meta">${meta.join(" · ")}</div>${esc(m.text)}</div>`;
    }).join("");
    memCard.style.display = "";
  } else { memCard.style.display = "none"; }

  // Activity: prefer structured activity[], fall back to plain thoughts[].
  const act = document.getElementById("activity");
  const events = Array.isArray(s.activity) && s.activity.length ? s.activity
               : (Array.isArray(s.thoughts) ? s.thoughts.map(t => ({ thought: t })) : []);
  if (events.length) {
    act.innerHTML = events.slice().reverse().map(e => {
      const meta = [];
      if (e.sim) meta.push(esc(e.sim));
      else if (e.t) meta.push(ago(e.t));
      if (e.action) meta.push(`<span class="act">${esc(e.action)}</span>`);
      const wh = e.whisper ? `<div class="wh">“${esc(e.whisper)}”</div>` : "";
      const head = meta.length ? `<div class="meta">${meta.join(" · ")}</div>` : "";
      const st = e.stats ? `<div class="snap">`
        + `e ${e.stats.energy} · f ${e.stats.full} · so ${e.stats.social} · `
        + `fu ${e.stats.fun} · h ${e.stats.health} · st ${e.stats.stress}</div>` : "";
      return `<div class="ev">${head}${wh}${esc(e.thought)}${st}</div>`;
    }).join("");
  } else {
    act.innerHTML = `<div class="empty">No activity recorded yet.</div>`;
  }

  document.getElementById("updated").textContent =
    meta.generated_at ? ("updated " + ago(meta.generated_at)) : "";

  // Build stamp: which commit this page was published from (set by the preview
  // workflow for PRs, by the VM publisher on main). Cuts through githack caching.
  const b = s.build || {};
  const parts = [];
  if (b.sha) parts.push("build " + esc(b.sha));
  if (b.ref) parts.push(esc(b.ref));
  if (b.committed) parts.push(esc(b.committed));
  document.getElementById("build").textContent = parts.join(" · ");
}

async function load() {
  try { render(await fetchState()); }
  catch (e) {
    document.getElementById("sub").textContent = "couldn't load state.json yet";
    document.getElementById("badge").className = "badge stale";
    document.getElementById("badge").textContent = "offline";
  }
}
load();
setInterval(load, 30000); // refresh every 30s
</script>
</body>
</html>
